<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Analytics Dashboard</title>

```
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
```

</head>

<body>

```
<div class="container">

    <header class="hero">

        <h1>📊 Student Analytics Dashboard</h1>

        <p class="timeline">
            Portfolio Project • June 2025
        </p>

        <p class="subtitle">
            Academic Performance Insights & Data Visualization
        </p>

    </header>

    <section class="controls">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search Student..."
        >

        <select id="subjectFilter" title="Subject Filter">
            <option value="all">All Subjects</option>
            <option value="math">Math</option>
            <option value="science">Science</option>
            <option value="english">English</option>
            <option value="hindi">Hindi</option>
        </select>

    </section>

    <section id="statsContainer"></section>

    <section class="chart-card">

        <h2>📈 Subject Performance Analysis</h2>

        <canvas id="performanceChart"></canvas>

    </section>

    <section class="chart-card">

        <h2>🥧 Performance Distribution</h2>

        <canvas id="performancePieChart"></canvas>

    </section>

    <section class="chart-card">

        <h2>📚 Subject Average Comparison</h2>

        <canvas id="subjectAverageChart"></canvas>

    </section>

    <section id="rankingContainer"></section>

    <section id="alertContainer"></section>

</div>

<script src="script.js"></script>
```

</body>

</html>
